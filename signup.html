<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign Up - Millburn Running Club 5K</title>
  <meta name="description" content="Sign up for the Millburn Running Club 5K charity fundraiser." />

  <style>
    :root{
      --bg:#0b1220;
      --card:#101a33;
      --muted:#a9b4d0;
      --text:#eef2ff; 
      --accent:#5eead4;
      --accent2:#60a5fa;
      --warn:#fbbf24;
      --border:rgba(255,255,255,.12);
      --shadow: 0 16px 60px rgba(0,0,0,.45);
      --radius: 18px;
      --max: 1100px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1000px 700px at 15% 15%, rgba(96,165,250,.22), transparent 55%),
        radial-gradient(900px 650px at 85% 25%, rgba(94,234,212,.18), transparent 55%),
        radial-gradient(900px 650px at 55% 90%, rgba(251,191,36,.12), transparent 55%),
        var(--bg);
      color:var(--text);
      line-height:1.5;
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:28px 18px 60px}
    .nav{
      display:flex; align-items:center; justify-content:space-between;
      gap:14px; padding:10px 0 18px;
    }
    .brand{
      display:flex; align-items:center; gap:12px;
      letter-spacing:.2px; font-weight:800;
    }
    .logo{
      width:40px; height:40px; border-radius:14px;
      background:
        radial-gradient(12px 12px at 28% 30%, rgba(94,234,212,.9), transparent 55%),
        radial-gradient(16px 16px at 72% 70%, rgba(96,165,250,.9), transparent 55%),
        linear-gradient(135deg, rgba(94,234,212,.25), rgba(96,165,250,.25));
      border:1px solid var(--border);
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .logo:before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(18px 18px at 70% 25%, rgba(251,191,36,.35), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 35%);
      opacity:.9;
    }
    .navlinks{display:flex; gap:12px; flex-wrap:wrap; justify-content:flex-end}
    .pill{
      text-decoration:none;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-weight:650;
      font-size:14px;
    }
    .pill:hover{background: rgba(255,255,255,.08); color: var(--text)}
    .card{
      background: rgba(16,26,51,.8);
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      padding:40px;
      text-align: center;
    }
    h1{
      margin:0 0 20px;
      font-size: 48px;
      line-height:1.05;
      letter-spacing:-.02em;
    }
    p{
      color: var(--muted);
      font-size: 18px;
      max-width: 600px;
      margin: 0 auto 30px;
    }
    .btn{
      cursor:pointer;
      border:none;
      border-radius: 14px;
      padding:12px 14px;
      font-weight:800;
      letter-spacing:.2px;
      display:inline-flex; align-items:center; gap:10px;
      text-decoration:none;
      transition: transform .08s ease, filter .2s ease;
    }
    .btn:active{transform: translateY(1px)}
    .btnPrimary{
      background: linear-gradient(135deg, rgba(94,234,212,.95), rgba(96,165,250,.95));
      color:#071018;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <div style="font-size:14px; font-weight:900; line-height:1.1;">Millburn Running Club</div>
          <div style="font-size:12px; color:var(--muted); font-weight:700;">Student-run • Community 5K</div>
        </div>
      </div>

      <div class="navlinks">
        <a class="pill" href="index.html">Home</a>
        <a class="pill" href="index.html#details">Details</a>
        <a class="pill" href="index.html#pricing">Pricing</a>
        <a class="pill" href="signup.html">Sign Up</a>
        <a class="pill" href="index.html#faq">FAQ</a>
      </div>
    </div>

    <div class="card">
      <h1>Sign Up Coming Soon</h1>
      <p>We're working hard to get the registration system ready. Sign up is not available right now, but check back soon!</p>
      <a href="index.html" class="btn btnPrimary">Back to Home</a>
    </div>
  </div>
</body>
</html>
